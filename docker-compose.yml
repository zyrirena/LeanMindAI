services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: leanmind
      POSTGRES_PASSWORD: leanmind
      POSTGRES_DB: leanmind
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanmind -d leanmind"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      # Override the network-internal hostnames; .env may have these but
      # docker-compose service DNS is what we want here.
      DATABASE_URL: postgresql+asyncpg://leanmind:leanmind@db:5432/leanmind
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
  qdrant_data:
